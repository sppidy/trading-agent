# Janus — super-level Docker Compose for the FOREX stack.
#
# NSE side runs as systemd (see ./install.sh, ./nse-backend/janus-nse-api.service,
# ./nse-agent/janus-nse-agent.service). NSE backend dynamically imports the NSE
# agent and shares state files — Docker is awkward for that. Run NSE on the host.
#
# Usage:
#   cp .env.docker.example .env.docker   # fill in real values
#   docker compose --env-file .env.docker up -d
#
# Bring up just one piece:
#   docker compose --env-file .env.docker up -d forex-postgres forex-api

services:
  forex-postgres:
    image: postgres:16-alpine
    container_name: janus-forex-postgres
    environment:
      POSTGRES_DB: forex_trading
      POSTGRES_USER: forex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env.docker.example)}
    volumes:
      - forex-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forex -d forex_trading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [janus]

  forex-api:
    build:
      context: .
      dockerfile: ./forex-backend/Dockerfile
    image: janus/forex-backend:latest
    container_name: janus-forex-api
    depends_on:
      forex-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://forex:${POSTGRES_PASSWORD}@forex-postgres:5432/forex_trading
      TRUSTED_ORIGINS: ${FOREX_TRUSTED_ORIGINS:-http://localhost:8445}
      ADMIN_API_KEY: ${FOREX_ADMIN_API_KEY:-}
      ADMIN_KEY_FILE: /run/forex/admin.key
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      MODEL_HMAC_SECRET: ${MODEL_HMAC_SECRET:-}
    ports:
      - "${FOREX_API_PORT:-8445}:8445"
    volumes:
      - forex-admin-key:/run/forex
    restart: unless-stopped
    networks: [janus]

  forex-autopilot:
    build:
      context: .
      dockerfile: ./forex-backend/Dockerfile
    image: janus/forex-backend:latest
    container_name: janus-forex-autopilot
    depends_on:
      forex-api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://forex:${POSTGRES_PASSWORD}@forex-postgres:5432/forex_trading
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      MODEL_HMAC_SECRET: ${MODEL_HMAC_SECRET:-}
    working_dir: /app/agent
    command: ["python", "-u", "autopilot.py", "--interval", "15"]
    restart: unless-stopped
    networks: [janus]

volumes:
  forex-pgdata:
  forex-admin-key:

networks:
  janus:
    name: janus
