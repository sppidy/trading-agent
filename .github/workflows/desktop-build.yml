name: Desktop Build (WinUI 3)

on:
  push:
    paths:
      - 'windows/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    paths:
      - 'windows/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
      - name: Restore
        run: msbuild Janus.Desktop.sln -t:Restore -p:Configuration=Release -p:Platform=x64
      - name: Build
        run: msbuild Janus.Desktop.sln -p:Configuration=Release -p:Platform=x64
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: Janus.Desktop-${{ github.sha }}
          path: windows/Janus.Desktop/bin/x64/Release/**/*
          if-no-files-found: warn
          retention-days: 30
