name: Android APK Build

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

# NOTE: requires SUBMODULE_PAT secret to pull the private android submodule.
# Signing secrets (RELEASE_KEYSTORE_BASE64, RELEASE_STORE_PASSWORD,
# RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD) are migrated from ai-trading-agent-utils.

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Decode keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/keystore/release.jks"
          KS="$RUNNER_TEMP/keystore/release.jks"
          SIZE=$(stat -c%s "$KS")
          echo "Keystore decoded: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Keystore looks too small ($SIZE bytes) — secret likely corrupted"
            exit 1
          fi
          TRIMMED_PASS=$(printf '%s' "$RELEASE_STORE_PASSWORD" | tr -d '[:space:]')
          TRIMMED_ALIAS=$(printf '%s' "$RELEASE_KEY_ALIAS" | tr -d '[:space:]')
          if ! keytool -list -keystore "$KS" -storepass "$TRIMMED_PASS" -alias "$TRIMMED_ALIAS" >/dev/null 2>keytool.err; then
            echo "::error::keytool could not open the keystore with the provided password/alias."
            cat keytool.err
            exit 1
          fi
          echo "Keystore password + alias verified OK"
          echo "RELEASE_STORE_FILE=$KS" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD_TRIMMED=$TRIMMED_PASS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS_TRIMMED=$TRIMMED_ALIAS" >> "$GITHUB_ENV"
      - name: Build debug APK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          ORG_GRADLE_JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
      - name: Build signed release APK
        if: ${{ env.RELEASE_STORE_FILE != '' }}
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          ORG_GRADLE_JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD_TRIMMED" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS_TRIMMED" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_STORE_PASSWORD_TRIMMED"
      - name: Upload release APK
        if: ${{ env.RELEASE_STORE_FILE != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90
