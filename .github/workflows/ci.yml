name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# NOTE: submodules are private. Set SUBMODULE_PAT (fine-grained PAT with read
# access to all 7 submodule repos) for CI to fetch them.

jobs:
  nse-agent-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nse-agent
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest -v

  nse-backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nse-backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v

  forex-agent-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forex-agent
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile-check all modules
        run: python -m compileall -q .

  forex-backend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forex-backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile-check all modules
        run: python -m compileall -q .

  android-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@v4
        id: setup-java
        with:
          distribution: temurin
          java-version: "17"
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Run Android unit tests
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          ORG_GRADLE_JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: ./gradlew testDebugUnitTest --no-daemon

  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Validate HTML
        run: |
          test -f index.html
          test -f app.js
          test -f styles.css
          echo "Web bundle present"
